# Configuración de base de datos en memoria para tests
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.test.database.replace=none

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.id.insert_returning_enabled=false
spring.jpa.properties.hibernate.jdbc.use_get_generated_keys=true
spring.jpa.show-sql=false

# Desactivar DataSeeder en tests
spring.jpa.defer-datasource-initialization=true
