<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shidell - Mensajes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .messaging-layout {
            display: grid;
            grid-template-columns: 340px 1fr;
            height: calc(100vh - 140px);
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
        }
        .chats-sidebar { border-right: 1px solid var(--border-color-dark); display: flex; flex-direction: column; }
        .sidebar-search { padding: 20px; border-bottom: 1px solid var(--border-color-dark); }
        .search-input-wrapper { background: #f1f5f9; border-radius: 12px; display: flex; align-items: center; padding: 0 12px; }
        .search-input-wrapper input { background: transparent; border: none; padding: 12px; width: 100%; outline: none; font-size: 14px; }
        .conversations-list { flex: 1; overflow-y: auto; }
        .convo-item { display: flex; align-items: center; gap: 12px; padding: 16px 20px; cursor: pointer; transition: 0.2s; border-bottom: 1px solid #f8fafc; }
        .convo-item:hover { background: #f8fafc; }
        .convo-item.active { background: var(--primary-light); border-left: 4px solid var(--primary); }
        .convo-avatar { width: 48px; height: 48px; background: #e2e8f0; border-radius: 50%; overflow: hidden; display: flex; align-items: center; justify-content: center; font-weight: 700; color: var(--text-secondary); flex-shrink: 0; }
        .convo-info { flex: 1; overflow: hidden; }
        .convo-name { font-weight: 700; font-size: 14px; color: var(--text-primary); display: block; }
        .convo-preview { font-size: 12px; color: var(--text-tertiary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-area { display: flex; flex-direction: column; background: #f8fafc; }
        .chat-header { padding: 16px 24px; background: white; border-bottom: 1px solid var(--border-color-dark); display: flex; align-items: center; gap: 12px; }
        .chat-messages { flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
        .msg-row { display: flex; align-items: flex-end; gap: 10px; width: 100%; }
        .msg-row.mine { justify-content: flex-end; }
        .msg-avatar-inline { width: 32px; height: 32px; border-radius: 50%; overflow: hidden; background: var(--teal-light); color: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex: 0 0 32px; }
        .msg-avatar-inline img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .msg-bubble { max-width: 70%; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.5; }
        .msg-sent { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .msg-received { align-self: flex-start; background: white; color: var(--text-primary); border-bottom-left-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .msg-time { font-size: 10px; opacity: 0.7; margin-top: 4px; display: block; text-align: right; }
        .chat-input-area { padding: 20px 24px; background: white; border-top: 1px solid var(--border-color-dark); display: flex; gap: 12px; align-items: center; }
        .chat-input { flex: 1; background: #f1f5f9; border: none; padding: 14px 20px; border-radius: 12px; outline: none; font-size: 14px; }
        .btn-send { width: 48px; height: 48px; background: var(--primary); color: white; border: none; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.2s; }
        .btn-send:hover { transform: scale(1.05); }
        .no-chat-selected { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-tertiary); gap: 12px; }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); z-index:999; align-items:center; justify-content:center; }
        .overlay.show { display: flex; }
        .modal { background: white; border-radius: 20px; padding: 32px; width: 90%; max-width: 420px; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.15); }
        .modal-close { position: absolute; top:16px; right:16px; cursor:pointer; font-size:20px; color:var(--text-secondary); }
    </style>
</head>
<body>
<div class="dashboard">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-icon"><i class="ph-fill ph-users"></i></div>
            <div class="logo-text"><h2>Shidell</h2><p>Portal Padres</p></div>
        </div>
        <nav class="sidebar-nav">
            <a href="portalpadres.html" class="nav-item"><i class="ph ph-house"></i><span>Inicio</span></a>
            <a href="calificaciones.html" class="nav-item"><i class="ph ph-star"></i><span>Calificaciones</span></a>
            <a href="asistencia.html" class="nav-item"><i class="ph ph-calendar-check"></i><span>Asistencia</span></a>
            <a href="tareas.html" class="nav-item"><i class="ph ph-clipboard-text"></i><span>Tareas</span></a>
            <a href="mensajes.html" class="nav-item active"><i class="ph ph-chat-circle-dots"></i><span>Mensajes</span></a>
            <a href="configuracion.html" class="nav-item"><i class="ph ph-gear"></i><span>Configuración</span></a>
        </nav>
        <div class="sidebar-footer">
            <button class="btn-logout" id="btn-logout"><i class="ph ph-sign-out"></i> Cerrar sesión</button>
        </div>
    </aside>

    <main class="main-wrapper">
        <header class="topbar">
            <div class="greeting">
                <h1>Mensajería</h1>
                <p>Comunícate con los docentes de tu hijo/a</p>
            </div>
            <div class="topbar-actions">
                <button class="notification-btn"><i class="ph ph-bell"></i><span class="badge"></span></button>
                <div class="top-user-info">
                    <div class="user-details"><span class="user-name padre-nombre">Padre</span></div>
                    <div class="avatar"><i class="ph-fill ph-user-circle" style="font-size:32px;"></i></div>
                </div>
            </div>
        </header>

        <div class="content-area" style="padding-top:0;">
            <div class="messaging-layout">
                <!-- Sidebar chats -->
                <div class="chats-sidebar">
                    <div class="sidebar-search">
                        <div class="search-input-wrapper">
                            <i class="ph ph-magnifying-glass"></i>
                            <input type="text" id="chat-search-input" placeholder="Buscar conversación...">
                        </div>
                    </div>
                    <div class="conversations-list" id="convo-list">
                        <p style="padding:20px; color:#94a3b8; text-align:center;">Cargando...</p>
                    </div>
                </div>

                <!-- Chat area -->
                <div class="chat-area">
                    <div id="chat-active" style="display:none; flex-direction:column; height:100%;">
                        <div class="chat-header">
                            <div class="convo-avatar" id="active-avatar">??</div>
                            <div>
                                <span class="convo-name" id="active-name">—</span>
                                <span style="font-size:11px; color:#22c55e;">En línea</span>
                            </div>
                        </div>
                        <div class="chat-messages" id="chat-messages"></div>
                        <div class="chat-input-area">
                            <label for="msg-file" style="width:48px;height:48px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:#f1f5f9;border-radius:12px;">
                                <i class="ph ph-paperclip" style="font-size:20px; color:var(--text-secondary);"></i>
                            </label>
                            <input type="file" id="msg-file" style="display:none;" accept=".pdf,.doc,.docx,.jpg,.png">
                            <input type="text" class="chat-input" id="chat-input" placeholder="Escribe un mensaje...">
                            <button class="btn-send" id="btn-send-msg">
                                <i class="ph-fill ph-paper-plane-right"></i>
                            </button>
                        </div>
                        <div id="file-preview" style="display:none;padding:10px 24px;background:#f1f5f9;font-size:12px;color:var(--primary);">
                            <i class="ph ph-file-pdf"></i> <span id="file-name-preview"></span>
                            <i class="ph ph-x" style="cursor:pointer;margin-left:10px;" id="cancel-file"></i>
                        </div>
                    </div>

                    <div id="no-chat" class="no-chat-selected">
                        <i class="ph ph-chat-circle-dots" style="font-size:64px; opacity:0.2;"></i>
                        <p>Selecciona una conversación para comenzar</p>
                        <button style="padding:10px 20px;background:var(--primary);color:white;border:none;border-radius:12px;font-weight:600;cursor:pointer;margin-top:4px;" id="btn-new-chat">
                            <i class="ph ph-plus"></i> Nuevo mensaje
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Modal contactos -->
<div class="overlay" id="contacts-modal">
    <div class="modal">
        <i class="ph ph-x modal-close" id="close-contacts"></i>
        <h2 style="margin-bottom:20px;">Docentes disponibles</h2>
        <div id="contacts-list-modal" style="max-height:400px; overflow-y:auto;"></div>
    </div>
</div>

<script src="../js/app.js"></script>
<script src="../js/mensajes.js"></script>

    <!-- SweetAlert2 para Alertas Elegantes -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/vendor/alertas.js"></script>

</body>
</html>
