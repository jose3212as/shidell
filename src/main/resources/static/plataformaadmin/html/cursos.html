<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cursos — Shidell Admin</title>
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/shared.css">
  <style>
    /* ── Grid ─────────────────────────────────────────────── */
    .cursos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 32px;
    }

    /* ── Aula Card ─────────────────────────────────────────── */
    .aula-card {
      background: var(--color-bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
      display: flex;
      flex-direction: column;
    }
    .aula-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,.15);
      border-color: var(--border-strong);
    }

    /* header strip with accent color */
    .aula-card-header {
      padding: 24px 24px 18px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 1px solid var(--border-color);
    }
    .aula-badge-nivel {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .6px;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 999px;
      margin-bottom: 6px;
    }
    .aula-title {
      font-size: 20px;
      font-weight: 800;
      color: var(--text-primary);
      line-height: 1.2;
    }
    .aula-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .aula-meta-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      padding: 2px 8px;
      border-radius: 6px;
    }
    .aula-detail-btn {
      flex-shrink: 0;
      width: 34px;
      height: 34px;
      border-radius: 10px;
      border: 1px solid var(--border-color);
      background: var(--bg-secondary);
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all .18s ease;
      font-size: 16px;
    }
    .aula-detail-btn:hover {
      background: var(--color-primary);
      color: #fff;
      border-color: var(--color-primary);
    }

    /* body */
    .aula-card-body {
      padding: 18px 24px 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* materias section */
    .aula-section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 6px;
    }
    .materias-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .materia-pill {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 8px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      white-space: nowrap;
      transition: background .15s;
    }
    .materia-pill:hover { background: var(--border-color); }

    /* docente section */
    .docente-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border-radius: 10px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
    }
    .docente-avatar {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 800;
      flex-shrink: 0;
    }
    .docente-name { font-size: 13px; font-weight: 700; color: var(--text-primary); line-height: 1.3; }
    .docente-role { font-size: 11px; color: var(--text-tertiary); font-weight: 500; }

    /* ── Turno divider ─────────────────────────────────────── */
    .turno-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 8px 0;
    }
    .turno-divider-line { flex: 1; height: 1px; background: var(--border-color); }
    .turno-divider-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .6px;
      text-transform: uppercase;
      color: var(--text-tertiary);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* ── Detail modal table ─────────────────────────────────── */
    .detail-table { width: 100%; border-collapse: collapse; }
    .detail-table thead tr { background: var(--bg-secondary); }
    .detail-table th {
      padding: 10px 14px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .6px;
      text-transform: uppercase;
      color: var(--text-tertiary);
    }
    .detail-table td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border-color);
      vertical-align: middle;
    }
    .detail-table tbody tr:hover { background: var(--bg-secondary); }
    .detail-table tbody tr:last-child td { border-bottom: none; }

    /* ── Filter chips ─────────────────────────────────────── */
    .filter-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-chip {
      padding: 6px 14px;
      border-radius: 999px;
      border: 1.5px solid var(--border-color);
      background: var(--bg-secondary);
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .18s ease;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .filter-chip:hover, .filter-chip.active {
      background: var(--color-primary);
      color: #fff;
      border-color: var(--color-primary);
    }

    /* ── Skeleton ─────────────────────────────────────────── */
    .skeleton-card {
      background: var(--color-bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      overflow: hidden;
      padding: 18px;
    }
    .skeleton-line {
      height: 12px;
      border-radius: 6px;
      background: linear-gradient(90deg, var(--border-color) 25%, var(--bg-secondary) 50%, var(--border-color) 75%);
      background-size: 400% 100%;
      animation: shimmer 1.4s infinite;
      margin-bottom: 8px;
    }
    @keyframes shimmer { 0%{background-position:100% 0} 100%{background-position:-100% 0} }
  </style>
</head>
<body>
<div class="app-shell" id="app-shell">
  <div class="main-content" id="main-content">
    <main class="page-content">

      <!-- Page Header -->
      <div class="page-header" style="margin-bottom:24px">
        <div class="page-header-left">
          <h1>Gestión de Aulas</h1>
          <p>Visualiza y administra el horario de cada aula del colegio</p>
        </div>
      </div>

      <!-- KPIs -->
      <div class="d-flex gap-16 mb-28" style="flex-wrap:wrap">
        <div class="kpi-card" style="flex:1;min-width:160px;padding:18px 20px;--kpi-bg:var(--blue-light);--kpi-color2:var(--blue)">
          <div class="kpi-icon" style="width:40px;height:40px;font-size:20px"><i class="ph-fill ph-chalkboard"></i></div>
          <div class="kpi-value" style="font-size:26px;margin-top:6px"><span id="total-cursos">—</span></div>
          <div class="kpi-label">Aulas totales</div>
        </div>
        <div class="kpi-card" style="flex:1;min-width:160px;padding:18px 20px;--kpi-bg:var(--yellow-light);--kpi-color2:var(--yellow)">
          <div class="kpi-icon" style="width:40px;height:40px;font-size:20px"><i class="ph-fill ph-sun"></i></div>
          <div class="kpi-value" style="font-size:26px;margin-top:6px"><span id="aulas-manana">—</span></div>
          <div class="kpi-label">Primaria · Mañana</div>
        </div>
        <div class="kpi-card" style="flex:1;min-width:160px;padding:18px 20px;--kpi-bg:var(--purple-light);--kpi-color2:var(--purple)">
          <div class="kpi-icon" style="width:40px;height:40px;font-size:20px"><i class="ph-fill ph-moon"></i></div>
          <div class="kpi-value" style="font-size:26px;margin-top:6px"><span id="cursos-con-docente">—</span></div>
          <div class="kpi-label">Secundaria · Tarde</div>
        </div>
        <div class="kpi-card" style="flex:1;min-width:160px;padding:18px 20px;--kpi-bg:var(--green-light);--kpi-color2:var(--green)">
          <div class="kpi-icon" style="width:40px;height:40px;font-size:20px"><i class="ph-fill ph-chalkboard-teacher"></i></div>
          <div class="kpi-value" style="font-size:26px;margin-top:6px"><span id="total-docentes">—</span></div>
          <div class="kpi-label">Docentes activos</div>
        </div>
      </div>

      <!-- Toolbar -->
      <div style="display:flex;gap:24px;flex-wrap:wrap;align-items:center;margin-bottom:32px">
        <!-- Search -->
        <div class="toolbar-search" style="flex:1;min-width:240px">
          <i class="ph ph-magnifying-glass"></i>
          <input type="text" id="curso-search" placeholder="Buscar por nivel, grado, sección, docente…">
        </div>
        <!-- Filter chips -->
        <div class="filter-chips">
          <button class="filter-chip active" id="chip-all" data-filter="">
            <i class="ph ph-list"></i> Todos
          </button>
          <button class="filter-chip" id="chip-primaria" data-filter="PRIMARIA">
            <i class="ph ph-sun"></i> Primaria
          </button>
          <button class="filter-chip" id="chip-secundaria" data-filter="SECUNDARIA">
            <i class="ph ph-moon"></i> Secundaria
          </button>
        </div>
        <!-- Grado select -->
        <select id="filter-grado" class="form-control form-select" style="width:130px">
          <option value="">Grado</option>
          <option value="1">1°</option><option value="2">2°</option>
          <option value="3">3°</option><option value="4">4°</option>
          <option value="5">5°</option><option value="6">6°</option>
        </select>
        <!-- Sección select -->
        <select id="filter-seccion" class="form-control form-select" style="width:120px">
          <option value="">Sección</option>
          <option value="A">A</option><option value="B">B</option><option value="C">C</option>
        </select>
      </div>

      <!-- Grid -->
      <div class="cursos-grid" id="cursos-grid">
        <!-- skeleton -->
        <div class="skeleton-card" style="animation:fadeInUp .3s ease">
          <div class="skeleton-line" style="width:40%;height:16px;margin-bottom:12px"></div>
          <div class="skeleton-line" style="width:70%;height:24px;margin-bottom:6px"></div>
          <div class="skeleton-line" style="width:50%"></div>
        </div>
        <div class="skeleton-card" style="animation:fadeInUp .3s .06s ease both">
          <div class="skeleton-line" style="width:40%;height:16px;margin-bottom:12px"></div>
          <div class="skeleton-line" style="width:70%;height:24px;margin-bottom:6px"></div>
          <div class="skeleton-line" style="width:50%"></div>
        </div>
        <div class="skeleton-card" style="animation:fadeInUp .3s .12s ease both">
          <div class="skeleton-line" style="width:40%;height:16px;margin-bottom:12px"></div>
          <div class="skeleton-line" style="width:70%;height:24px;margin-bottom:6px"></div>
          <div class="skeleton-line" style="width:50%"></div>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- ── Modal Detalle de Aula ─────────────────────────────── -->
<div class="modal-overlay hidden" id="aula-detail-modal" style="z-index:1100">
  <div class="modal" style="max-width:860px;width:96vw;max-height:88vh;display:flex;flex-direction:column;border-radius:18px">
    <div class="modal-header" style="border-radius:18px 18px 0 0">
      <div>
        <span class="modal-title" id="detail-modal-title">Horario del Aula</span>
        <div class="text-xs text-muted" id="detail-modal-sub" style="margin-top:2px"></div>
      </div>
      <button class="modal-close" onclick="closeDetailModal()"><i class="ph ph-x"></i></button>
    </div>
    <div style="overflow-y:auto;flex:1;padding:20px 24px">
      <table class="detail-table">
        <thead>
          <tr>
            <th>Día</th>
            <th>Hora</th>
            <th>Materia</th>
            <th>Docente</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="detail-table-body">
          <tr><td colspan="5" style="text-align:center;padding:40px">
            <div class="spinner spinner-lg" style="margin:0 auto"></div>
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- ── Modal Editar Sesión ───────────────────────────────── -->
<div class="modal-overlay hidden" id="curso-modal-overlay">
  <div class="modal modal-lg">
    <div class="modal-header">
      <span class="modal-title" id="curso-modal-title">Editar Sesión</span>
      <button class="modal-close" onclick="closeCursoModal()"><i class="ph ph-x"></i></button>
    </div>
    <form id="curso-form">
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Nombre del curso <span class="required">*</span></label>
          <input class="form-control" id="fc-nombre" placeholder="Ej: Matemáticas" required>
        </div>
        <div class="form-grid-2">
          <div class="form-group">
            <label class="form-label">Nivel</label>
            <select class="form-control form-select" id="fc-nivel">
              <option value="">Seleccionar</option>
              <option value="PRIMARIA">Primaria</option>
              <option value="SECUNDARIA">Secundaria</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Grado</label>
            <select class="form-control form-select" id="fc-grado">
              <option value="">Seleccionar</option>
              <option value="1">1°</option><option value="2">2°</option>
              <option value="3">3°</option><option value="4">4°</option>
              <option value="5">5°</option><option value="6">6°</option>
            </select>
          </div>
        </div>
        <div class="form-grid-2">
          <div class="form-group">
            <label class="form-label">Sección</label>
            <select class="form-control form-select" id="fc-seccion">
              <option value="">Seleccionar</option>
              <option value="A">A</option><option value="B">B</option>
              <option value="C">C</option><option value="D">D</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Turno</label>
            <select class="form-control form-select" id="fc-turno">
              <option value="">Seleccionar</option>
              <option value="MAÑANA">Mañana</option>
              <option value="TARDE">Tarde</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Docente</label>
          <select class="form-control form-select" id="f-profesor">
            <option value="">Sin asignar</option>
          </select>
        </div>
        <div class="form-grid-2">
          <div class="form-group">
            <label class="form-label">Ícono</label>
            <select class="form-control form-select" id="fc-icono">
              <option value="">Seleccionar</option>
              <option value="ph-calculator">Calculadora</option>
              <option value="ph-flask">Ciencias</option>
              <option value="ph-book-open">Lectura</option>
              <option value="ph-globe">Geografía</option>
              <option value="ph-music-notes">Música</option>
              <option value="ph-paint-brush">Arte</option>
              <option value="ph-soccer-ball">Deporte</option>
              <option value="ph-translate">Idioma</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Color</label>
            <select class="form-control form-select" id="fc-color">
              <option value="">Seleccionar</option>
              <option value="purple">Morado</option>
              <option value="blue">Azul</option>
              <option value="green">Verde</option>
              <option value="yellow">Amarillo</option>
              <option value="red">Rojo</option>
              <option value="cyan">Cian</option>
              <option value="orange">Naranja</option>
            </select>
          </div>
        </div>
        <div class="form-grid-2">
          <div class="form-group">
            <label class="form-label">Día de la semana</label>
            <select class="form-control form-select" id="fc-dia">
              <option value="">Sin definir</option>
              <option value="1">Lunes</option><option value="2">Martes</option>
              <option value="3">Miércoles</option><option value="4">Jueves</option>
              <option value="5">Viernes</option>
            </select>
          </div>
          <div></div>
        </div>
        <div class="form-grid-2">
          <div class="form-group">
            <label class="form-label">Hora inicio</label>
            <input class="form-control" id="fc-hora-inicio" type="time">
          </div>
          <div class="form-group">
            <label class="form-label">Hora fin</label>
            <input class="form-control" id="fc-hora-fin" type="time">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="closeCursoModal()">Cancelar</button>
        <button type="submit" class="btn btn-primary" id="btn-curso-submit">
          <i class="ph ph-floppy-disk"></i> Guardar cambios
        </button>
      </div>
    </form>
  </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/shared.js"></script>
<script src="../js/cursos.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="/vendor/alertas.js"></script>
</body>
</html>
