<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reportes — Shidell Admin</title>
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/shared.css">
</head>
<body>
<div class="app-shell" id="app-shell">
  <div class="main-content" id="main-content">
    <main class="page-content">
      
      <!-- ── HERO BANNER ──────────────────────────────────── -->
      <div class="calif-hero" style="background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%); border-radius: 20px; padding: 36px 40px; margin-bottom: 28px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: space-between;">
        <div style="position: relative; z-index: 1;">
          <h1 style="font-size: 26px; font-weight: 800; color: #fff; margin: 0 0 6px;">
            <i class="ph ph-chart-line-up" style="font-size:22px;vertical-align:middle;margin-right:8px"></i>Reportes y Analytics
          </h1>
          <p style="color: rgba(255,255,255,.65); font-size: 14px; margin: 0;">Análisis general y distribución demográfica de la plataforma</p>
        </div>
        <div style="position: relative; z-index: 1; display:flex; gap:12px;">
          <button class="btn btn-secondary" onclick="exportarCSV()" style="background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:#fff; backdrop-filter:blur(10px)">
            <i class="ph ph-download-simple"></i>Exportar CSV
          </button>
          <button class="btn btn-primary" onclick="loadReporteGeneral()">
            <i class="ph ph-arrows-clockwise"></i>Actualizar
          </button>
        </div>
      </div>

      <!-- ── KPIs ─────────────────────────────────────────── -->
      <div class="grid-4 mb-24">
        <div class="kpi-card stagger-item" style="--kpi-bg:var(--primary-light);--kpi-color2:var(--primary); padding:20px; border-radius:16px; border:1px solid var(--border-color); background:var(--color-bg-card)">
          <div class="kpi-icon" style="width:48px;height:48px;background:var(--primary-light);color:var(--primary);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px"><i class="ph-fill ph-users-three"></i></div>
          <div class="kpi-value" style="font-size:32px; font-weight:800; margin-top:12px"><span id="r-usuarios">—</span></div>
          <div class="kpi-label" style="font-size:12px; color:var(--text-tertiary); font-weight:600">Usuarios totales</div>
        </div>
        <div class="kpi-card stagger-item" style="--kpi-bg:var(--cyan-light);--kpi-color2:var(--cyan); padding:20px; border-radius:16px; border:1px solid var(--border-color); background:var(--color-bg-card)">
          <div class="kpi-icon" style="width:48px;height:48px;background:var(--cyan-light);color:var(--cyan);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px"><i class="ph-fill ph-student"></i></div>
          <div class="kpi-value" style="font-size:32px; font-weight:800; margin-top:12px"><span id="r-estudiantes">—</span></div>
          <div class="kpi-label" style="font-size:12px; color:var(--text-tertiary); font-weight:600">Estudiantes matriculados</div>
        </div>
        <div class="kpi-card stagger-item" style="--kpi-bg:var(--purple-light);--kpi-color2:var(--purple); padding:20px; border-radius:16px; border:1px solid var(--border-color); background:var(--color-bg-card)">
          <div class="kpi-icon" style="width:48px;height:48px;background:var(--purple-light);color:var(--purple);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px"><i class="ph-fill ph-chalkboard-teacher"></i></div>
          <div class="kpi-value" style="font-size:32px; font-weight:800; margin-top:12px"><span id="r-docentes">—</span></div>
          <div class="kpi-label" style="font-size:12px; color:var(--text-tertiary); font-weight:600">Docentes activos</div>
        </div>
        <div class="kpi-card stagger-item" style="--kpi-bg:var(--yellow-light);--kpi-color2:var(--yellow); padding:20px; border-radius:16px; border:1px solid var(--border-color); background:var(--color-bg-card)">
          <div class="kpi-icon" style="width:48px;height:48px;background:var(--yellow-light);color:var(--yellow);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px"><i class="ph-fill ph-book-open"></i></div>
          <div class="kpi-value" style="font-size:32px; font-weight:800; margin-top:12px"><span id="r-cursos">—</span></div>
          <div class="kpi-label" style="font-size:12px; color:var(--text-tertiary); font-weight:600">Cursos impartidos</div>
        </div>
      </div>

      <!-- ── CHARTS ─────────────────────────────────────────── -->
      <div class="d-flex gap-20 mb-24 flex-wrap">
        <!-- Chart: Roles -->
        <div class="card" style="flex:1;min-width:300px; max-width: 400px;">
          <div class="card-header">
            <div class="card-title">Distribución por Rol</div>
          </div>
          <div style="position:relative; height:240px; padding:10px;">
            <canvas id="chartRoles"></canvas>
          </div>
        </div>
        <!-- Chart: Estudiantes por grado -->
        <div class="card" style="flex:2;min-width:400px">
          <div class="card-header">
            <div class="card-title">Población Estudiantil por Sección</div>
          </div>
          <div style="position:relative; height:240px; padding:10px; width:100%">
            <canvas id="chartGrados"></canvas>
          </div>
        </div>
      </div>

      <!-- Tabla docentes -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">Carga Académica de Docentes</div>
        </div>
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr>
                <th>Docente</th>
                <th>Cursos asignados</th>
                <th>Cursos</th>
                <th>Estado</th>
              </tr>
            </thead>
            <tbody id="docentes-tbody">
              <tr><td colspan="4" class="text-center" style="padding:30px">
                <div class="spinner" style="margin:0 auto"></div>
              </td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/shared.js"></script>
<script src="../js/reportes.js"></script>

    <!-- SweetAlert2 para Alertas Elegantes -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/vendor/alertas.js"></script>

</body>
</html>
