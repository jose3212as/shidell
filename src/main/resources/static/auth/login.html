<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shidell - Iniciar Sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../plataformaestudiante/css/styles.css">
</head>
<body>
    <div class="auth-page">
        <!-- Lado Izquierdo: Formulario -->
        <div class="auth-left">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-logo">
                        <i class="ph-fill ph-graduation-cap"></i>
                    </div>
                    <h1>¡Bienvenido de nuevo!</h1>
                    <p>Por favor, ingresa tus credenciales para continuar.</p>
                </div>

                <form class="auth-form">
                    <div class="form-group">
                        <label for="email">Correo Electrónico</label>
                        <div class="input-wrapper">
                            <i class="ph ph-envelope"></i>
                            <input type="email" id="email" placeholder="ejemplo@shidell.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <div class="input-wrapper">
                            <i class="ph ph-lock"></i>
                            <input type="password" id="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox"> Recordarme
                        </label>
                        <a href="#" class="forgot-pass">¿Olvidaste tu contraseña?</a>
                    </div>

                    <button type="submit" class="auth-btn">Iniciar Sesión</button>
                </form>

                <div class="auth-footer">
                    <p>¿No tienes una cuenta? <a href="register.html">Regístrate aquí</a></p>
                </div>
            </div>
        </div>

        <!-- Lado Derecho: Ilustración/Mensaje -->
        <div class="auth-right">
            <div class="decor-circle circle-1"></div>
            <div class="decor-circle circle-2"></div>
            
            <div class="auth-right-content">
                <h2>Potencia tu futuro académico con Shidell</h2>
                <p>Tu portal integral para gestionar cursos, tareas y seguir tu progreso en tiempo real. ¡Todo en un solo lugar!</p>
                
                <div class="auth-illustration">
                    <img src="https://img.icons8.com/color/240/learning.png" alt="learning illustration">
                </div>
            </div>
        </div>
    </div>

    <script>
        document.querySelector('.auth-form').addEventListener('submit', async function(e) {
            e.preventDefault(); // Evita la recarga de página

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                // Usar URL absoluta para permitir pruebas abriendo el archivo directamente
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (response.ok) {
                    const user = await response.json();
                    localStorage.setItem('shidell_user', JSON.stringify(user));
                    if (user.rol === 'ADMINISTRADOR' || user.rol === 'ADMIN') {
                        localStorage.setItem('shidell_admin', JSON.stringify(user));
                    } else {
                        localStorage.removeItem('shidell_admin');
                    }

                    // Redirigir según el rol de la base de datos
                    const rolUpper = user.rol ? user.rol.toUpperCase() : '';
                    if (rolUpper === 'ESTUDIANTE') {
                        window.location.href = '../plataformaestudiante/html/portalestudiante.html';
                    } else if (rolUpper === 'DOCENTE') {
                        window.location.href = '../plataformadocente/html/portaldocente.html';
                    } else if (rolUpper === 'ADMINISTRADOR' || rolUpper === 'ADMIN') {
                        window.location.href = '../plataformaadmin/html/dashboard.html';
                    } else if (rolUpper === 'PADRE') {
                        window.location.href = '../plataformapadres/html/portalpadres.html';
                    } else {
                        AppAlerts.mostrarError('Rol no reconocido', user.rol);
                    }

                } else {
                    const errorMsg = await response.json().catch(() => ({}));
                    AppAlerts.mostrarError(errorMsg.error || 'Correo o contraseña incorrectos', 'Verifica tus credenciales');
                }
            } catch (error) {
                console.error("Error connecting to server:", error);
                AppAlerts.mostrarError('Error al conectar con el servidor', '¿Está encendido el backend?');
            }
        });
    </script>

    <!-- SweetAlert2 para Alertas Elegantes -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/vendor/alertas.js"></script>

</body>
</html>
