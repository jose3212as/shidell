<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shidell - Registro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../plataformaestudiante/css/styles.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-left">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-logo"><i class="ph-fill ph-user-plus"></i></div>
                    <h1>Crear cuenta</h1>
                    <p>Registra tus datos para acceder al portal Shidell.</p>
                </div>

                <form class="auth-form" id="registerForm">
                    <div class="form-group">
                        <label for="nombres">Nombres</label>
                        <div class="input-wrapper"><i class="ph ph-user"></i><input id="nombres" required></div>
                    </div>
                    <div class="form-group">
                        <label for="apellidos">Apellidos</label>
                        <div class="input-wrapper"><i class="ph ph-identification-card"></i><input id="apellidos" required></div>
                    </div>
                    <div class="form-group">
                        <label for="email">Correo electrónico</label>
                        <div class="input-wrapper"><i class="ph ph-envelope"></i><input type="email" id="email" required></div>
                    </div>
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <div class="input-wrapper"><i class="ph ph-lock"></i><input type="password" id="password" minlength="6" required></div>
                    </div>
                    <div class="form-group">
                        <label for="rol">Rol</label>
                        <div class="input-wrapper">
                            <i class="ph ph-shield-check"></i>
                            <select id="rol" required style="width:100%;min-width:0;border:0;outline:0;background:transparent;font:inherit;color:var(--text-primary);">
                                <option value="">Elige rol</option>
                                <option value="ESTUDIANTE">Estudiante</option>
                                <option value="DOCENTE">Docente</option>
                                <option value="PADRE">Padre de familia</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="auth-btn">Registrarme</button>
                </form>

                <div class="auth-footer">
                    <p>¿Ya tienes una cuenta? <a href="login.html">Inicia sesión</a></p>
                </div>
            </div>
        </div>

        <div class="auth-right">
            <div class="decor-circle circle-1"></div>
            <div class="decor-circle circle-2"></div>
            <div class="auth-right-content">
                <h2>Tu portal académico empieza aquí</h2>
                <p>Accede a cursos, tareas, calificaciones y comunicación interna desde un solo espacio.</p>
                <div class="auth-illustration">
                    <img src="https://img.icons8.com/color/240/student-registration.png" alt="registro educativo">
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            const payload = {
                nombres: document.getElementById('nombres').value.trim(),
                apellidos: document.getElementById('apellidos').value.trim(),
                email: document.getElementById('email').value.trim(),
                password: document.getElementById('password').value,
                rol: document.getElementById('rol').value
            };

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'No se pudo registrar la cuenta');
                if (data.rol === 'DOCENTE') location.href = '../plataformadocente/html/portaldocente.html';
                else if (data.rol === 'PADRE') location.href = '../plataformapadres/html/portalpadres.html';
                else location.href = '../plataformaestudiante/html/portalestudiante.html';
            } catch (error) {
                AppAlerts.mostrarError('Error en el registro', error.message);
            }
        });
    </script>

    <!-- SweetAlert2 para Alertas Elegantes -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/vendor/alertas.js"></script>

</body>
</html>
