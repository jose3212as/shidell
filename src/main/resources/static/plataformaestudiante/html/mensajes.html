<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shidell - Mensajería</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="../js/session-api.js?v=apiestudiante20260512i"></script>
    <link rel="stylesheet" href="../css/styles.css?v=avatar20260505e">
    <style>
        /* Modern Messaging Layout Styles */
        .messaging-layout {
            display: flex;
            height: calc(100vh - 140px);
            background: #ffffff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            border: 1px solid var(--border-color-dark);
        }

        /* Sidebar de Chats */
        .chats-sidebar {
            width: 380px;
            border-right: 1px solid var(--border-color-dark);
            display: flex;
            flex-direction: column;
            background: #fdfdfd;
            flex-shrink: 0;
        }

        .sidebar-search {
            padding: 24px;
            border-bottom: 1px solid var(--border-color-dark);
            background: #ffffff;
        }

        .search-input-wrapper {
            position: relative;
            background: #f1f5f9;
            border-radius: 14px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            transition: all 0.2s ease;
        }
        .search-input-wrapper:focus-within {
            background: #ffffff;
            box-shadow: 0 0 0 2px var(--primary-light), 0 0 0 4px var(--primary);
        }

        .search-input-wrapper input {
            background: transparent;
            border: none;
            padding: 14px;
            width: 100%;
            outline: none;
            font-size: 14px;
            color: var(--text-primary);
        }
        .search-input-wrapper i { color: var(--text-tertiary); font-size: 20px; }

        .conversations-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px 0;
        }

        .convo-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 24px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 4px solid transparent;
        }

        .convo-item:hover { background: #f8fafc; }
        .convo-item.active { 
            background: #eff6ff; 
            border-left: 4px solid var(--primary); 
        }

        .convo-avatar {
            width: 52px;
            height: 52px;
            background: #e2e8f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        .convo-info { flex: 1; overflow: hidden; }
        .convo-name { font-weight: 600; font-size: 15px; color: var(--text-primary); display: block; margin-bottom: 4px; }
        .convo-preview { font-size: 13px; color: var(--text-tertiary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }

        /* Area de Chat */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f8fafc;
            position: relative;
        }

        .chat-header {
            padding: 20px 32px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color-dark);
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 10;
        }

        .chat-messages {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .msg-row {
            max-width: 76%;
            display: flex;
            align-items: flex-end;
            gap: 10px;
        }

        .msg-row.mine {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg-row.theirs {
            align-self: flex-start;
        }

        .msg-avatar-inline {
            width: 36px;
            height: 36px;
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 50%;
            border: 1px solid var(--border-color-dark);
            background: #e2e8f0;
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 800;
        }

        .msg-avatar-inline img,
        .convo-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .msg-bubble {
            padding: 14px 20px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.5;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            word-wrap: break-word;
        }

        .msg-sent {
            background: linear-gradient(135deg, var(--primary), var(--purple));
            color: white;
            border-bottom-right-radius: 4px;
        }

        .msg-received {
            background: white;
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }

        .chat-input-area {
            padding: 24px 32px;
            background: white;
            border-top: 1px solid var(--border-color-dark);
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            background: #f1f5f9;
            border: none;
            padding: 16px 24px;
            border-radius: 16px;
            outline: none;
            font-size: 15px;
            transition: 0.2s;
        }
        .chat-input:focus {
            background: white;
            box-shadow: 0 0 0 2px var(--primary-light), 0 0 0 4px var(--primary);
        }

        .btn-send {
            width: 54px;
            height: 54px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: all 0.2s ease;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.25);
        }
        .btn-send:hover:not(:disabled) { 
            transform: translateY(-2px); 
            box-shadow: 0 12px 25px rgba(37, 99, 235, 0.35); 
        }
        .btn-send:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            box-shadow: none;
        }

        .no-chat-selected {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-tertiary);
            gap: 16px;
            background: #f8fafc;
        }

        /* Modal Contactos */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }
        .overlay.show { display: flex; }
        .modal {
            background: white;
            border-radius: 24px;
            padding: 32px;
            width: 90%;
            max-width: 460px;
            position: relative;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
            animation: modalFade 0.3s ease;
        }
        @keyframes modalFade {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .modal-close {
            position: absolute;
            top: 24px;
            right: 24px;
            cursor: pointer;
            font-size: 24px;
            color: var(--text-tertiary);
            transition: 0.2s;
        }
        .modal-close:hover { color: var(--red); }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar Principal -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon"><i class="ph-fill ph-graduation-cap"></i></div>
                <div class="logo-text"><h2>Shidell</h2><p>Portal Estudiante</p></div>
            </div>
            <nav class="sidebar-nav">
                <a href="portalestudiante.html" class="nav-item"><i class="ph ph-house"></i><span>Inicio</span></a>
                <a href="miscursos.html" class="nav-item"><i class="ph ph-book-open"></i><span>Mis cursos</span></a>
                <a href="tareas.html" class="nav-item"><i class="ph ph-clipboard-text"></i><span>Tareas</span></a>
                <a href="calificaciones.html" class="nav-item"><i class="ph ph-star"></i><span>Calificaciones</span></a>
                <a href="calendario.html" class="nav-item"><i class="ph ph-calendar-blank"></i><span>Calendario</span></a>
                <a href="mensajes.html" class="nav-item active"><i class="ph ph-chat-circle-dots"></i><span>Mensajes</span></a>
                <a href="miprogreso.html" class="nav-item"><i class="ph ph-shield-check"></i><span>Mi progreso</span></a>
                <a href="configuracion.html" class="nav-item"><i class="ph ph-gear"></i><span>Configuración</span></a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-wrapper">
            <header class="topbar">
                <div class="greeting">
                    <h1>Mensajería</h1>
                    <p>Comunícate con tus profesores y compañeros</p>
                </div>
                <div class="top-user-info">
                    <div class="user-details"><span class="user-name">Cargando...</span></div>
                    <div class="avatar"><i class="ph-fill ph-user-circle" style="font-size: 32px;"></i></div>
                </div>
            </header>

            <div class="content-area" style="padding-top: 0;">
                <div class="messaging-layout">
                    
                    <!-- Chats Sidebar -->
                    <div class="chats-sidebar">
                        <div class="sidebar-search">
                            <div class="search-input-wrapper" style="margin-bottom: 16px;">
                                <i class="ph ph-magnifying-glass"></i>
                                <input type="text" id="chat-search-input" placeholder="Buscar conversación...">
                            </div>
                            <div class="course-filter-wrapper">
                                <label style="font-size: 11px; font-weight: 700; color: var(--text-tertiary); margin-bottom: 6px; display: block; letter-spacing: 0.5px;">FILTRAR POR CURSO</label>
                                <select id="course-filter" style="width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border-color-dark); background: #f8fafc; font-size: 14px; color: var(--text-primary); outline: none; transition: 0.2s; cursor: pointer;">
                                    <option value="">— Todos los cursos —</option>
                                </select>
                            </div>
                        </div>
                        <div class="conversations-list" id="convo-list">
                            <!-- Inyectado por JS -->
                        </div>
                    </div>

                    <!-- Chat Active Area -->
                    <div class="chat-area">
                        <!-- Pantalla activa -->
                        <div id="chat-active" style="display: none; flex-direction: column; height: 100%;">
                            
                            <div class="chat-header">
                                <div class="convo-avatar" id="active-avatar" style="width: 48px; height: 48px; font-size: 16px;">??</div>
                                <div>
                                    <span class="convo-name" id="active-name" style="font-size: 16px; margin-bottom: 2px;">Selecciona un chat</span>
                                    <span id="active-status" style="font-size: 12px; color: var(--green); font-weight: 500; display: flex; align-items: center; gap: 4px;"><span style="width:6px;height:6px;background:var(--green);border-radius:50%;display:inline-block;"></span> En línea</span>
                                </div>
                            </div>

                            <div class="chat-messages" id="chat-messages">
                                <!-- Burbujas inyectadas por JS -->
                            </div>

                            <!-- Preview Archivo -->
                            <div id="file-preview" style="display:none; padding: 12px 32px; background: #f8fafc; font-size: 13px; color: var(--primary); border-top: 1px solid var(--border-color-dark); align-items: center; gap: 8px;">
                                <i class="ph ph-file-text" style="font-size: 20px;"></i>
                                <span id="file-name-preview" style="flex: 1; font-weight: 500;"></span>
                                <i class="ph ph-x" style="cursor:pointer; font-size: 18px; color: var(--text-tertiary);" id="cancel-file"></i>
                            </div>

                            <!-- Input Area -->
                            <div class="chat-input-area">
                                <label for="msg-file" style="width: 54px; height: 54px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: #f1f5f9; border-radius: 16px; transition: 0.2s;">
                                    <i class="ph ph-paperclip" style="font-size: 24px; color: var(--text-secondary);"></i>
                                </label>
                                <input type="file" id="msg-file" style="display: none;" accept=".pdf,.doc,.docx,.jpg,.png">
                                
                                <input type="text" class="chat-input" id="chat-input" placeholder="Escribe un mensaje aquí...">
                                
                                <button class="btn-send" id="btn-send-msg">
                                    <i class="ph-fill ph-paper-plane-right"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Pantalla vacía -->
                        <div id="no-chat" class="no-chat-selected">
                            <div style="width: 100px; height: 100px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 8px;">
                                <i class="ph ph-chat-teardrop-dots" style="font-size: 48px; color: var(--primary);"></i>
                            </div>
                            <h3 style="color: var(--text-primary);">Tus Mensajes</h3>
                            <p style="margin-bottom: 8px;">Selecciona una conversación para comenzar a chatear.</p>
                            <button class="auth-btn" style="padding: 12px 24px; font-size: 14px;" id="btn-new-chat">
                                <i class="ph ph-plus" style="margin-right: 6px;"></i> Iniciar nueva charla
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal de Contactos -->
    <div class="overlay" id="contacts-modal">
        <div class="modal">
            <i class="ph ph-x modal-close" id="close-contacts"></i>
            <h2 style="margin-bottom: 24px; color: var(--text-primary); font-size: 22px;">Tus Contactos</h2>
            <div id="contacts-list-modal" style="max-height: 400px; overflow-y: auto; padding-right: 8px; display: flex; flex-direction: column; gap: 8px;">
                <!-- Lista de contactos -->
            </div>
        </div>
    </div>

<script src="../js/app.js?v=apiestudiante20260512i"></script>
<script src="../js/notificaciones.js?v=apiestudiante20260512i"></script>
    <script src="../js/mensajes.js?v=apiestudiante20260512i"></script>

    <!-- SweetAlert2 para Alertas Elegantes -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/vendor/alertas.js"></script>

</body>
</html>
