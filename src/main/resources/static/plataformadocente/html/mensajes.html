<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shidell - Mensajería</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .messaging-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            height: calc(100vh - 140px);
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
        }

        /* Sidebar de Chats */
        .chats-sidebar {
            border-right: 1px solid var(--border-color-dark);
            display: flex;
            flex-direction: column;
        }

        .sidebar-search {
            padding: 20px;
            border-bottom: 1px solid var(--border-color-dark);
        }

        .search-input-wrapper {
            position: relative;
            background: #f1f5f9;
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 0 12px;
        }

        .search-input-wrapper input {
            background: transparent;
            border: none;
            padding: 12px;
            width: 100%;
            outline: none;
            font-size: 14px;
        }

        .conversations-list {
            flex: 1;
            overflow-y: auto;
        }

        .convo-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 1px solid #f8fafc;
        }

        .convo-item:hover { background: #f8fafc; }
        .convo-item.active { background: #eff6ff; border-left: 4px solid var(--primary); }

        .convo-avatar {
            width: 48px;
            height: 48px;
            background: #e2e8f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: var(--text-secondary);
            flex-shrink: 0;
            overflow: hidden;
        }

        .convo-avatar img,
        .msg-avatar-inline img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .convo-info { flex: 1; overflow: hidden; }
        .convo-name { font-weight: 700; font-size: 14px; color: var(--text-primary); display: block; }
        .convo-preview { font-size: 12px; color: var(--text-tertiary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Area de Chat */
        .chat-area {
            display: flex;
            flex-direction: column;
            background: #f8fafc;
        }

        .chat-header {
            padding: 16px 24px;
            background: white;
            border-bottom: 1px solid var(--border-color-dark);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-messages {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .msg-row {
            max-width: 76%;
            display: flex;
            align-items: flex-end;
            gap: 10px;
        }

        .msg-row.mine {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg-row.theirs {
            align-self: flex-start;
        }

        .msg-avatar-inline {
            width: 36px;
            height: 36px;
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 50%;
            border: 1px solid var(--border-color-dark);
            background: #e2e8f0;
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 800;
        }

        .msg-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            position: relative;
        }

        .msg-sent {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .msg-received {
            align-self: flex-start;
            background: white;
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .msg-time {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 4px;
            display: block;
            text-align: right;
        }

        .chat-input-area {
            padding: 20px 24px;
            background: white;
            border-top: 1px solid var(--border-color-dark);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            background: #f1f5f9;
            border: none;
            padding: 14px 20px;
            border-radius: 12px;
            outline: none;
            font-size: 14px;
        }

        .btn-send {
            width: 48px;
            height: 48px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .btn-send:hover { transform: scale(1.05); }

        .no-chat-selected {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-tertiary);
            gap: 12px;
        }

        .unread-pill {
            min-width: 22px;
            height: 22px;
            padding: 0 7px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--primary);
            color: white;
            font-size: 11px;
            font-weight: 800;
        }

        #profile-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    </style>
</head>

<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon"><i class="ph-fill ph-chalkboard-teacher"></i></div>
                <div class="logo-text"><h2>Shidell</h2><p>Portal Docente</p></div>
            </div>
            <nav class="sidebar-nav">
                <a href="portaldocente.html" class="nav-item">
                    <i class="ph ph-house"></i><span>Inicio</span>
                </a>
                <a href="misclases.html" class="nav-item">
                    <i class="ph ph-presentation-chart"></i><span>Mis Clases</span>
                </a>
                <a href="tareas.html" class="nav-item">
                    <i class="ph ph-notebook"></i><span>Tareas</span>
                </a>
                <a href="estudiantes.html" class="nav-item">
                    <i class="ph ph-users"></i><span>Estudiantes</span>
                </a>
                <a href="calificaciones.html" class="nav-item">
                    <i class="ph ph-check-square"></i><span>Calificaciones</span>
                </a>
                <a href="calendario.html" class="nav-item">
                    <i class="ph ph-calendar"></i><span>Calendario</span>
                </a>
                <a href="mensajes.html" class="nav-item active">
                    <i class="ph ph-chat-circle-dots"></i><span>Mensajes</span>
                </a>
                <a href="reportes.html" class="nav-item nav-bottom-start"><i class="ph ph-chart-bar"></i><span>Reportes</span></a>
                <a href="configuracion.html" class="nav-item"><i class="ph ph-gear"></i><span>Configuración</span></a>
            </nav>
        </aside>

        <main class="main-wrapper">
            <header class="topbar">
                <div class="greeting">
                    <h1>Mensajería</h1>
                    <p id="teacher-context">Cargando datos del docente...</p>
                </div>
                <div class="topbar-actions">
                    <div class="top-user-info">
                        <div class="user-details">
                            <span class="user-name" id="user-name-label">Docente</span>
                            <span class="user-role">Docente</span>
                        </div>
                        <div class="user-dropdown">
                            <div class="avatar" id="profile-avatar"><i class="ph-fill ph-user-circle" style="font-size: 32px;"></i></div>
                            <i class="ph ph-caret-down dropdown-icon"></i>
                            <div class="dropdown-menu">
                                <a href="/login.html" id="btn-logout" class="dropdown-item">
                                    <i class="ph ph-sign-out"></i><span>Cerrar sesión</span>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <div class="content-area" style="padding-top: 0;">
                <div class="messaging-layout">
                    <!-- Chats Sidebar -->
                    <div class="chats-sidebar">
                        <div class="sidebar-search">
                            <div class="search-input-wrapper" style="margin-bottom: 12px;">
                                <i class="ph ph-magnifying-glass"></i>
                                <input type="text" placeholder="Buscar conversación..." id="search-input">
                            </div>
                            <div class="course-filter-wrapper">
                                <label style="font-size: 11px; font-weight: 700; color: var(--text-tertiary); margin-bottom: 4px; display: block;">FILTRAR POR CURSO</label>
                                <select id="course-filter" style="width: 100%; padding: 10px; border-radius: 12px; border: 1px solid var(--border-color-dark); background: #f8fafc; font-size: 13px; color: var(--text-main); outline: none;">
                                    <option value="">Todos los cursos</option>
                                    <!-- Dinámico -->
                                </select>
                            </div>
                        </div>
                        <div class="conversations-list" id="convo-list">
                            <!-- Inyectado por JS -->
                        </div>
                    </div>

                    <!-- Chat Active Area -->
                    <div class="chat-area">
                        <div id="chat-active" style="display: none; flex-direction: column; height: 100%;">
                            <div class="chat-header">
                                <div class="convo-avatar" id="active-avatar">AL</div>
                                <div>
                                    <span class="convo-name" id="active-name">Selecciona un chat</span>
                                    <span id="active-status" style="font-size: 11px; color: #22c55e;">En línea</span>
                                </div>
                            </div>

                            <div class="chat-messages" id="chat-messages">
                                <!-- Burbujas inyectadas por JS -->
                            </div>

                            <div class="chat-input-area">
                                <label for="msg-file" class="btn-secondary" style="width: 48px; height: 48px; padding: 0; display: flex; align-items: center; justify-content: center; cursor: pointer;">
                                    <i class="ph ph-paperclip" style="font-size: 20px;"></i>
                                </label>
                                <input type="file" id="msg-file" style="display: none;" accept=".pdf,.doc,.docx,.jpg,.png">
                                <input type="text" class="chat-input" id="chat-input" placeholder="Escribe un mensaje...">
                                <button class="btn-send" id="btn-send-msg">
                                    <i class="ph-fill ph-paper-plane-right"></i>
                                </button>
                            </div>
                            <div id="file-preview" style="display:none; padding: 10px 24px; background: #f1f5f9; font-size: 12px; color: var(--primary);">
                                <i class="ph ph-file-pdf"></i> <span id="file-name-preview"></span>
                                <i class="ph ph-x" style="cursor:pointer; margin-left:10px;" onclick="cancelFile()"></i>
                            </div>
                        </div>

                        <div id="no-chat" class="no-chat-selected">
                            <i class="ph ph-chat-circle-dots" style="font-size: 64px; opacity: 0.2;"></i>
                            <p>Selecciona una conversación para comenzar</p>
                            <button class="btn-primary" style="padding: 10px 20px; font-size: 13px;" onclick="nuevoChat()">
                                <i class="ph ph-plus"></i> Iniciar nueva charla
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal para nuevo chat -->
    <div class="overlay" id="contacts-modal">
        <div class="modal" style="max-width: 400px;">
            <i class="ph ph-x modal-close" onclick="closeContacts()"></i>
            <h2 style="margin-bottom: 20px;">Tus Alumnos</h2>
            <div id="contacts-list" style="max-height: 400px; overflow-y: auto;">
                <!-- Lista de alumnos para iniciar chat -->
            </div>
        </div>
    </div>

    <script src="../js/app.js?v=docentedash20260518"></script>
    <script src="../js/notificaciones.js?v=20260518"></script>
    <script src="../js/mensajes.js?v=docenteapi20260508"></script>

    <!-- SweetAlert2 para Alertas Elegantes -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/vendor/alertas.js"></script>

</body>
</html>
